<script>
/* CLOCK */
function updateClock(){
  let now=new Date();
  document.getElementById("clock").innerHTML=now.toLocaleString();
}
setInterval(updateClock,1000);

/* CALCULATOR */
function calc(val){
  let display = document.getElementById("calcDisplay");
  display.value += val;
}

function calculate(){
  let display = document.getElementById("calcDisplay");

  try{
    if(display.value.trim() !== ""){
      display.value = Function('"use strict";return (' + display.value + ')')();
    }
  }
  catch(err){
    alert("Invalid Calculation");
  }
}

function clearCalc(){
  document.getElementById("calcDisplay").value = "";
}
/* KEYBOARD SUPPORT */
document.addEventListener("keydown", function(e){

  const display = document.getElementById("calcDisplay");

  if("0123456789+-*/.".includes(e.key)){
      display.value += e.key;
  }

  if(e.key === "Enter"){
      e.preventDefault();
      calculate();
  }

  if(e.key === "Backspace"){
      display.value = display.value.slice(0,-1);
  }

  if(e.key === "Escape"){
      display.value = "";
  }

});
/* REQUEST NOTIFICATION PERMISSION */
if("Notification" in window && Notification.permission!=="granted"){
  Notification.requestPermission();
}

/* WINDOWS CALENDAR */
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let today=new Date();
let month=today.getMonth();
let year=today.getFullYear();

function populateMonthYearSelectors(){
  const monthSelect=document.getElementById("monthSelect");
  const yearSelect=document.getElementById("yearSelect");
  months.forEach((m,i)=>{ let opt=document.createElement("option"); opt.value=i; opt.text=m; monthSelect.add(opt); });
  for(let y=year-100; y<=year+100; y++){ let opt=document.createElement("option"); opt.value=y; opt.text=y; yearSelect.add(opt); }
  monthSelect.value=month;
  yearSelect.value=year;
  monthSelect.onchange=()=>{ month=parseInt(monthSelect.value); generateCalendar(); };
  yearSelect.onchange=()=>{ year=parseInt(yearSelect.value); generateCalendar(); };
}

function generateCalendar(){
  const table=document.querySelector("#calendarTable tbody");
  table.innerHTML="";
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  let date=1;
  for(let i=0;i<6;i++){
    const row=document.createElement("tr");
    for(let j=0;j<7;j++){
      const cell=document.createElement("td");
      cell.style.padding="5px"; cell.style.textAlign="center";
      if(i===0 && j<firstDay) cell.innerHTML="";
      else if(date>daysInMonth) cell.innerHTML="";
      else{
        cell.innerHTML=date;
        if(date===today.getDate() && month===today.getMonth() && year===today.getFullYear()){
          cell.style.background="red"; cell.style.color="white"; cell.style.borderRadius="50%";
        }
        date++;
      }
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
}
function prevMonth(){ month--; if(month<0){ month=11; year--; } generateCalendar(); document.getElementById("monthSelect").value=month; document.getElementById("yearSelect").value=year; }
function nextMonth(){ month++; if(month>11){ month=0; year++; } generateCalendar(); document.getElementById("monthSelect").value=month; document.getElementById("yearSelect").value=year; }
populateMonthYearSelectors();
generateCalendar();

/* FETCH QATAR PRAYER TIMES (ALADHAN API) */
async function loadPrayerTimes(){
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = today.getMonth()+1;
  const dd = today.getDate();

  const url = `https://api.aladhan.com/v1/timings/${dd}-${mm}-${yyyy}?latitude=25.285447&longitude=51.531040&method=4`;
  const res = await fetch(url);
  const data = await res.json();
  if(data.code===200){
    const times = data.data.timings;
    const prayerList = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
    const tbody = document.getElementById("prayer-table-body");
    tbody.innerHTML = "";
    prayerList.forEach(p=>{
      const t = times[p];
      const row = `<tr><td>${p}</td><td>${t}</td></tr>`;
      tbody.insertAdjacentHTML("beforeend",row);
    });

    // Save prayer times for notifications
    window.prayerNotifyTimes = prayerList.map(p=> times[p]);
  }
}
loadPrayerTimes();

/* PRAYER NOTIFICATION SOUND & POPUP */
function notifyPrayer(prayerName){
  const audio = new Audio('https://www.soundjay.com/button/beep-07.wav');
  audio.play();
  if(Notification.permission==="granted"){
    new Notification("Prayer Time", {body: `${prayerName} time has arrived!`});
  }
}

setInterval(()=>{
  if(!window.prayerNotifyTimes) return;
  const now = new Date();
  const cur = now.toTimeString().slice(0,5);
  const prayerList = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
  window.prayerNotifyTimes.forEach((time,index)=>{
    if(time===cur){
      notifyPrayer(prayerList[index]);
    }
  });
},60000);
</script>
